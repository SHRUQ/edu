<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المادة الممتعة</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        #game-box {
            background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 90%; max-width: 500px; text-align: center;
            border: 8px solid #FFC107; position: relative;
        }
        .question { font-size: 22px; color: #333; margin-bottom: 20px; min-height: 60px; }
        .options { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button {
            padding: 15px; font-size: 18px; cursor: pointer; border: none;
            border-radius: 15px; background: #4CAF50; color: white;
            transition: 0.2s; font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px #2E7D32;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px #2E7D32; }
        #start-screen, #end-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; border-radius: 22px; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin-bottom: 15px; }
        .progress { height: 100%; background: #FF9800; width: 0%; border-radius: 10px; transition: 0.4s; }
    </style>
</head>
<body>

<div id="game-box">
    <!-- شاشة البداية -->
    <div id="start-screen">
        <h1 style="color: #E91E63;">🎮 تحدي العلوم 🔊</h1>
        <p>اضغط للبدء وسماع الموسيقى!</p>
        <button onclick="startGame()" style="background: #2196F3; padding: 20px 50px;">ابدأ الآن!</button>
    </div>

    <!-- واجهة اللعب -->
    <div class="progress-bar"><div id="progress" class="progress"></div></div>
    <div class="question" id="q-text">السؤال يظهر هنا</div>
    <div class="options" id="opt-container"></div>
    <div style="margin-top: 15px; font-weight: bold; color: #673AB7;">النتيجة: <span id="live-score">0</span></div>

    <!-- شاشة النهاية -->
    <div id="end-screen" class="hidden">
        <h1 id="res-title"></h1>
        <p id="res-text" style="font-size: 20px;"></p>
        <button onclick="location.reload()" style="background: #FF5722;">العب مرة أخرى 🔄</button>
    </div>
</div>

<!-- ملفات الصوت المباشرة -->
<!-- موسيقى خلفية مرحة -->
<audio id="bgMusic" loop>
    <source src="https://assets.mixkit.co" type="audio/mpeg">
</audio>
<!-- صوت تصفيق -->
<audio id="clapSound">
    <source src="https://www.myinstants.com" type="audio/mpeg">
</audio>
<!-- صوت خطأ -->
<audio id="wrongSound">
    <source src="https://www.myinstants.com" type="audio/mpeg">
</audio>

<script>
    const quiz = [
        { q: "المادة هي ما تتكون منه كل...؟", a: ["الأجسام", "الألوان"], c: 0 },
        { q: "من خصائص الجسم: الهيئة والملبس و...؟", a: ["الطعم والصوت", "الركض"], c: 0 },
        { q: "اللون والحجم والصلابة تعتبر من...؟", a: ["الخصائص", "الأسماء"], c: 0 },
        { q: "المواد التي تلمع مثل الأواني تسمى مادة...؟", a: ["صلبة ولامعة", "سائلة"], c: 0 },
        { q: "كم حالة توجد للمادة؟", a: ["3 حالات", "حالة واحدة"], c: 0 },
        { q: "الحالات الثلاث هي: صلبة وسائلة و...؟", a: ["غازية", "باردة"], c: 0 },
        { q: "المادة التي لا يتغير شكلها بسهولة هي؟", a: ["الصلبة", "السائلة"], c: 0 },
        { q: "القطن مادة صلبة ولكنها...؟", a: ["لينة", "قاسية"], c: 0 },
        { q: "المادة التي تغوص في القاع هي؟", a: ["الثقيلة (مثل الحجر)", "الخفيفة"], c: 0 },
        { q: "المادة التي تطفو فوق الماء هي؟", a: ["الخشب والفلين", "المفتاح"], c: 0 },
        { q: "الخام والناعم صفتان لـ...؟", a: ["النسيج", "الطول"], c: 0 },
        { q: "هل يذوب السكر في الماء؟", a: ["نعم يذوب", "لا يذوب"], c: 0 },
        { q: "الرمل في الماء...؟", a: ["لا يذوب ويغوص", "يختفي"], c: 0 },
        { q: "المادة التي تشغل حيزاً وتنتشر هي؟", a: ["الغازية", "الصلبة"], c: 0 },
        { q: "هل يمكن لجسمين شغل نفس المكان؟", a: ["لا يمكن", "نعم يمكن"], c: 0 }
    ];

    let currentQ = 0;
    let score = 0;

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        let music = document.getElementById('bgMusic');
        music.volume = 0.2; // صوت منخفض للموسيقى
        music.play().catch(e => console.log("الصوت يحتاج ضغطة أولاً"));
        showQ();
    }

    function showQ() {
        if (currentQ >= quiz.length) {
            endGame();
            return;
        }
        let qData = quiz[currentQ];
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('progress').style.width = (currentQ / quiz.length * 100) + "%";
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        qData.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAns(i);
            container.appendChild(btn);
        });
    }

    function checkAns(idx) {
        if (idx === quiz[currentQ].c) {
            score++;
            document.getElementById('clapSound').play();
        } else {
            document.getElementById('wrongSound').play();
        }
        document.getElementById('live-score').innerText = score;
        currentQ++;
        setTimeout(showQ, 800);
    }

    function endGame() {
        document.getElementById('end-screen').classList.remove('hidden');
        const title = document.getElementById('res-title');
        const text = document.getElementById('res-text');
        
        if (score > 7) {
            title.innerText = "🎊 ممتــــــــاز يا بطل 🎊";
            title.style.color = "#4CAF50";
            text.innerText = `درجتك رائعة: ${score} من 15`;
        } else {
            title.innerText = "😟 حاول مرة أخرى";
            title.style.color = "#F44336";
            text.innerText = `حصلت على ${score} فقط، ركز في المرة القادمة!`;
        }
    }
</script>

</body>
</html>
