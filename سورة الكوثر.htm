<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مسابقة سورة الكوثر - شروق الحنيطي</title>
    <style>
        :root { --main: #6c5ce7; --bg: #f9f9f9; }
        body { font-family: 'Arial', sans-serif; background: #a29bfe; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #container { background: white; width: 90%; max-width: 550px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; border: 6px solid #81ecec; }
        .btn { background: var(--main); color: white; border: none; padding: 15px 25px; border-radius: 15px; cursor: pointer; font-size: 18px; width: 100%; margin: 8px 0; transition: 0.3s; font-weight: bold; }
        .btn:hover { transform: scale(1.02); background: #5649c0; }
        .q-text { font-size: 24px; color: #2d3436; margin-bottom: 20px; font-weight: bold; line-height: 1.5; }
        .score-bar { display: flex; justify-content: space-between; font-weight: bold; color: var(--main); margin-bottom: 10px; }
        #feedback { font-size: 22px; height: 35px; margin: 15px 0; font-weight: bold; }
        .hidden { display: none; }
        .progress { background: #eee; height: 12px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { background: #00cec9; height: 100%; width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div id="container">
    <div id="start-screen">
        <h1 style="color: var(--main)">🎮 تحدي سورة الكوثر</h1>
        <p>بإشراف المعلمة: <b>شروق الحنيطي</b></p>
        <button class="btn" onclick="start()">ابدأ المسابقة الآن 🔊</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="score-bar">
            <span id="q-count">السؤال: 1/15</span>
            <span id="score-text">النقاط: 0</span>
        </div>
        <div class="progress"><div id="progress-fill"></div></div>
        <div class="q-text" id="question"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 style="color: #00b894">🏆 أحسنت يا بطل</h1>
        <div id="final-result" style="font-size: 35px; margin: 20px 0; color: var(--main);"></div>
        <button class="btn" onclick="location.reload()">إعادة الاختبار 🔄</button>
    </div>
</div>

<!-- نغمة المنبه المستمرة -->
<audio id="snd-alarm" loop src="https://www.soundjay.com"></audio>
<!-- صوت الفشل -->
<audio id="snd-fail" src="https://www.myinstants.com"></audio>
<!-- صوت النجاح النهائي -->
<audio id="snd-win" src="https://www.myinstants.com"></audio>

<script>
    const quizData = [
        { q: "الكوثر هو نهر في الجنة أعطاه الله لنبينا محمد ﷺ.", t: "tf", a: true },
        { q: "ما معنى كلمة 'الأبتر'؟", t: "mc", o: ["القوي الشجاع", "المنقطع عن كل خير"], c: 1 },
        { q: "نزلت سورة الكوثر رداً على العاص بن وائل.", t: "tf", a: true },
        { q: "نحر الأضاحي يكون تقرباً لله وحده.", t: "tf", a: true },
        { q: "ماذا نفعل لكي نشرب من الكوثر؟", t: "mc", o: ["العبادة والصلاة", "اللعب الكثير"], c: 0 },
        { q: "الشانئ هو العدو الذي يكره النبي ﷺ.", t: "tf", a: true },
        { q: "يوجد نهر الكوثر في الدنيا قبل الآخرة.", t: "tf", a: false },
        { q: "ماذا نقول عند ذبح الأضحية؟", t: "mc", o: ["باسم الله والله أكبر", "الحمد لله"], c: 0 },
        { q: "سورة الكوثر هي أقصر سورة في القرآن الكريم.", t: "tf", a: true },
        { q: "بشرت السورة النبي ﷺ بالخير الكثير.", t: "tf", a: true },
        { q: "لماذا سمي عيد الأضحى بهذا الاسم؟", t: "mc", o: ["بسبب الأضاحي", "بسبب الصيام"], c: 0 },
        { q: "شكر الله يكون بالصلاة والعمل الصالح.", t: "tf", a: true },
        { q: "مبغض النبي ﷺ هو المنقطع عن الخير.", t: "tf", a: true },
        { q: "عدد آيات سورة الكوثر هو 3 آيات.", t: "tf", a: true },
        { q: "الاقتداء بالنبي ﷺ من طرق شكر الله.", t: "tf", a: true }
    ];

    let current = 0, score = 0;

    function start() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        // بدء نغمة المنبه فوراً
        const alarm = document.getElementById('snd-alarm');
        alarm.volume = 0.5; 
        alarm.play();
        showQ();
    }

    function showQ() {
        if (current >= quizData.length) return end();
        const data = quizData[current];
        document.getElementById('question').innerText = data.q;
        document.getElementById('q-count').innerText = `السؤال: ${current + 1}/15`;
        document.getElementById('progress-fill').style.width = ((current + 1) / 15 * 100) + "%";
        
        const opts = document.getElementById('options');
        opts.innerHTML = '';

        if (data.t === "tf") {
            opts.appendChild(createBtn("صح ✅", () => check(true)));
            opts.appendChild(createBtn("خطأ ❌", () => check(false)));
        } else {
            data.o.forEach((v, i) => opts.appendChild(createBtn(v, () => check(i))));
        }
    }

    function createBtn(txt, fn) {
        const b = document.createElement('button'); b.className = "btn"; b.innerText = txt; b.onclick = fn; return b;
    }

    function check(ans) {
        const data = quizData[current];
        const isCorrect = (data.t === "tf") ? (ans === data.a) : (ans === data.c);
        const fb = document.getElementById('feedback');

        if (isCorrect) {
            score++;
            fb.innerText = "بطل! إجابة صحيحة 🌟"; fb.style.color = "#00b894";
        } else {
            document.getElementById('snd-fail').play();
            fb.innerText = "حاول مجدداً 🦾"; fb.style.color = "#d63031";
        }

        document.getElementById('score-text').innerText = `النقاط: ${score}`;
        current++;
        setTimeout(() => { fb.innerText = ""; showQ(); }, 1000);
    }

    function end() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-result').innerText = `نتيجتك: ${score} من 15`;
        // إيقاف نغمة المنبه وتشغيل صوت الفوز
        document.getElementById('snd-alarm').pause();
        document.getElementById('snd-win').play();
    }
</script>

</body>
</html>
