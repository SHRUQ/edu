<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي ماريو للعلوم - صح أم خطأ</title>
    <style>
        body {
            background-color: #4B0082; /* نهدي غامق */
            color: #FFFF00; /* أصفر */
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: #6A5ACD; /* نهدي فاتح */
            padding: 40px;
            border-radius: 30px;
            border: 8px solid #FFFF00;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        h1 { font-size: 50px; text-shadow: 3px 3px #000; margin-bottom: 10px; }
        .question { font-size: 38px; margin-bottom: 30px; min-height: 100px; line-height: 1.4; }
        .options-grid { display: flex; justify-content: center; gap: 30px; }
        
        .btn-choice {
            width: 180px;
            height: 100px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-true { background-color: #2ecc71; color: white; } /* أخضر للصح */
        .btn-false { background-color: #e74c3c; color: white; } /* أحمر للخطأ */
        
        button:hover { transform: scale(1.1); filter: brightness(1.2); }
        
        #score-area { font-size: 35px; margin-top: 30px; color: #fff; font-weight: bold; }
        .hidden { display: none; }
        #start-btn { font-size: 45px; padding: 20px 70px; background: #FFFF00; color: #4B0082; border-radius: 50px; cursor: pointer; border: 4px solid #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍄 تحدي صح أم خطأ 🍄</h1>
        
        <div id="start-screen">
            <p style="font-size: 30px;">اضغط للبدء والاستماع لنغمة ماريو!</p>
            <button id="start-btn" onclick="startGame()">ابدأ المغامرة!</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="question-number" style="font-size: 24px; color: #ffeb3b; margin-bottom: 10px;"></div>
            <div class="question" id="question-text"></div>
            <div class="options-grid">
                <button class="btn-choice btn-true" onclick="checkAnswer(true)">✅ صح</button>
                <button class="btn-choice btn-false" onclick="checkAnswer(false)">❌ خطأ</button>
            </div>
            <div id="score-area">النقاط: <span id="score">0</span></div>
        </div>

        <div id="end-screen" class="hidden">
            <h2 style="font-size: 50px;">انتهت اللعبة! 🌟</h2>
            <div id="final-result" style="font-size: 45px; margin-bottom: 20px;"></div>
            <button id="start-btn" onclick="location.reload()">إعادة اللعب</button>
        </div>
    </div>

    <!-- نغمة سوبر ماريو -->
    <audio id="bg-music" loop>
        <source src="https://www.soundboard.com" type="audio/mpeg">
    </audio>

    <script>
        const questions = [
            { q: "السائل هو أحد أنواع المادة وله كتلة ويشغل حيزاً.", a: true },
            { q: "للسوائل شكل محدد وثابت دائماً.", a: false },
            { q: "تتخذ السوائل شكل الإناء الذي توضع فيه.", a: true },
            { q: "العسل وصلصة الطماطم من السوائل التي تنساب بسرعة.", a: false },
            { q: "اللبن والزيت ينسابان بسرعة عند سكبهما.", a: true },
            { q: "نستخدم المخبار المدرج لقياس كمية السوائل.", a: true },
            { q: "كأس القياس يقيس مقدار الحيز الذي يشغله السائل.", a: true },
            { q: "الغاز يشبه السائل في أن ليس له شكل محدد.", a: true },
            { q: "الغازات لا تنتشر في الحيز الموجودة فيه.", a: false },
            { q: "تحرك الغاز داخل البالون يؤدي لتغير شكله.", a: true },
            { q: "الهواء ليس مادة وليس له كتلة.", a: false },
            { q: "يتكون الهواء الذي نتنفسه من غازات مختلفة.", a: true },
            { q: "يمكننا رؤية الغازات المكونة للهواء بوضوح بالعين.", a: false },
            { q: "الهواء يمكن أن يكون بارداً أو دافئاً ويمكننا الإحساس به.", a: true },
            { q: "يساعد الهواء الطائرة الورقية على البقاء مرتفعة.", a: true }
        ];

        let currentIdx = 0;
        let score = 0;
        const music = document.getElementById('bg-music');

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            music.play().catch(e => console.log("تحتاج لتفاعل المستخدم لتشغيل الصوت"));
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-number').innerText = `السؤال ${currentIdx + 1} من 15`;
            document.getElementById('question-text').innerText = q.q;
        }

        function checkAnswer(userAnswer) {
            if (userAnswer === questions[currentIdx].a) {
                score++;
                document.getElementById('score').innerText = score;
                // يمكنك إضافة صوت "correct" هنا
            }
            
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            let message = score >= 10 ? "أحسنت يا بطل! 🏆" : "حاول مرة أخرى! 💪";
            document.getElementById('final-result').innerHTML = `${message} <br> درجتك: ${score} من 15`;
        }
    </script>
</body>
</html>
