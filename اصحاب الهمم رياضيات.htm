<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي الأبطال - أ. شروق الحنيطي</title>
    <style>
        @import url('https://fonts.googleapis.com');

        :root { 
            --primary: #0288d1; --accent: #ffeb3b; 
            --success: #4caf50; --danger: #f44336; --bg: #fffde7; 
            --tally-color: #0d47a1;
        }

        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); 
            margin: 0; direction: rtl; overflow-x: hidden;
        }

        /* غلاف خاص ومبهج */
        #cover {
            height: 100vh; background: linear-gradient(135deg, #00acc1, #007c91);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; position: relative;
        }
        
        .title-box h1 { font-size: 4rem; margin: 0; text-shadow: 4px 4px 0px rgba(0,0,0,0.2); }
        .title-box p { font-size: 2rem; margin-top: 10px; background: rgba(0,0,0,0.1); padding: 5px 20px; border-radius: 50px; }

        .start-btn {
            padding: 25px 80px; font-size: 3rem; background: var(--accent);
            border: none; border-radius: 60px; cursor: pointer; color: #333;
            box-shadow: 0 12px 0 #fbc02d; font-weight: 900; transition: 0.2s;
            margin-top: 50px; animation: bounce 2s infinite;
        }

        .signature {
            position: absolute; bottom: 30px; font-size: 1.2rem;
            color: white; font-weight: bold;
        }

        /* البطاقة الرئيسية */
        .game-card {
            background: white; border-radius: 40px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); max-width: 800px;
            margin: 20px auto; border: 8px solid #00bcd4;
        }

        #q-text { color: #004d40; font-size: 2rem; margin-bottom: 30px; font-weight: 900; }

        .visual-container { 
            background: #f1f8e9; border: 3px solid #c5e1a5; border-radius: 30px;
            padding: 30px; min-height: 250px; display: flex; justify-content: center; 
            align-items: center; margin-bottom: 30px;
        }

        /* علامات الإحصاء 4+1 */
        .tally-bundle { position: relative; display: flex; gap: 8px; width: 50px; height: 60px; margin: 0 15px; }
        .tally-line { width: 6px; height: 100%; background: var(--tally-color); border-radius: 4px; }
        .tally-strike { 
            position: absolute; width: 70px; height: 7px; background: #d32f2f; 
            top: 25px; left: -10px; transform: rotate(-45deg); border-radius: 4px; 
        }

        /* الأيقونات الكبيرة */
        .big-icon { font-size: 6rem; transition: 0.3s; }

        /* أزرار الإجابة الضخمة */
        .options-zone { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .btn-choice { 
            padding: 20px 40px; font-size: 2.5rem; border: none; border-radius: 30px; 
            background: #fff; border: 5px solid var(--primary); color: var(--primary);
            cursor: pointer; font-weight: 900; box-shadow: 0 8px 0 #0277bd;
        }
        .btn-choice:active { transform: translateY(8px); box-shadow: 0 0 0 #0277bd; }

        #feedback { font-size: 2.5rem; font-weight: 900; min-height: 60px; margin-bottom: 20px; }

        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.1);} }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com"></audio>
<audio id="snd-correct" src="https://assets.mixkit.co"></audio>
<audio id="snd-fail" src="https://assets.mixkit.co"></audio>

<div id="cover">
    <div class="title-box">
        <h1>✨ تَحدي الأبطال ✨</h1>
        <p>نَتعلم العَد مَعاً بِمرح</p>
    </div>
    <button class="start-btn" onclick="startGame()">ابدأ 🚀</button>
    <div class="signature">إعداد المعلّمة: شروق الحنيطي</div>
</div>

<div id="game-ui" style="display:none;">
    <div class="game-card">
        <div id="q-header" style="font-size: 1.5rem; color: var(--primary); margin-bottom: 10px;">
            السؤال <span id="q-num">1</span> من 10
        </div>
        <h2 id="q-text"></h2>
        <div class="visual-container" id="visual-area"></div>
        <div id="feedback"></div>
        <div class="options-zone" id="options-area"></div>
    </div>
</div>

<script>
let current = 0;
let score = 0;

function createTallyHTML(n) {
    let bundles = Math.floor(n / 5);
    let singles = n % 5;
    let html = `<div style="display:flex; gap:20px; justify-content:center; align-items:center;">`;
    for(let i=0; i<bundles; i++) {
        html += `<div class="tally-bundle">
                    <div class="tally-line"></div><div class="tally-line"></div>
                    <div class="tally-line"></div><div class="tally-line"></div>
                    <div class="tally-strike"></div>
                 </div>`;
    }
    for(let j=0; j<singles; j++) {
        html += `<div style="width:6px; height:60px; background:var(--tally-color); border-radius:4px; margin:0 5px;"></div>`;
    }
    return html + `</div>`;
}

const questions = [
    { q: "كم عدد التفاحات 🍎؟", type: 'icons', items: '🍎🍎', ans: 2 },
    { q: "كم عدد العلامات الموضحة؟", type: 'tally', val: 3, ans: 3 },
    { q: "اختر الرقم 5", type: 'icons', items: '🖐️', ans: 5 },
    { q: "كم عدد القطط 🐱؟", type: 'icons', items: '🐱🐱🐱🐱', ans: 4 },
    { q: "ما هو رقم الحزمة المشطوبة؟", type: 'tally', val: 5, ans: 5 },
    { q: "كم عدد النجوم ⭐؟", type: 'icons', items: '⭐', ans: 1 },
    { q: "اختر العدد 3", type: 'tally', val: 3, ans: 3 },
    { q: "كم عدد الورود 🌸؟", type: 'icons', items: '🌸🌸🌸', ans: 3 },
    { q: "كم عدد السمكات 🐠؟", type: 'icons', items: '🐠🐠🐠🐠🐠', ans: 5 },
    { q: "السؤال الأخير: اختر الرقم 1", type: 'icons', items: '☝️', ans: 1 }
];

function startGame() {
    document.getElementById('bg-music').play();
    document.getElementById('cover').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    render();
}

function render() {
    const q = questions[current];
    document.getElementById('q-num').innerText = current + 1;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('feedback').innerText = "";
    
    const viz = document.getElementById('visual-area');
    const optArea = document.getElementById('options-area');
    viz.innerHTML = ""; optArea.innerHTML = "";

    if(q.type === 'icons') {
        viz.innerHTML = `<div class="big-icon">${q.items}</div>`;
    } else {
        viz.innerHTML = createTallyHTML(q.val);
    }

    // أزرار أرقام كبيرة من 1 إلى 5 فقط للتبسيط
    for(let i=1; i<=5; i++) {
        optArea.innerHTML += `<button class="btn-choice" onclick="check(${i})">${i}</button>`;
    }
}

function check(val) {
    let q = questions[current];
    if(val == q.ans) {
        score++;
        document.getElementById('snd-correct').play();
        document.getElementById('feedback').innerText = "بطل! أحسنت ✅";
        document.getElementById('feedback').style.color = "green";
    } else {
        document.getElementById('feedback').innerText = "حاول مرة أخرى 🔄";
        document.getElementById('feedback').style.color = "red";
    }

    setTimeout(() => {
        current++;
        if(current < 10) render();
        else finishGame();
    }, 1500);
}

function finishGame() {
    let resultHTML = "";
    if (score >= 5) {
        document.getElementById('snd-correct').play();
        resultHTML = `
            <h1 style="font-size:6rem;">🏆</h1>
            <h2 style="color:var(--success)">مبروك ناجح!</h2>
            <p style="font-size:2rem;">أنت بطل رائع</p>
        `;
    } else {
        document.getElementById('snd-fail').play();
        resultHTML = `
            <h1 style="font-size:6rem;">💪</h1>
            <h2 style="color:var(--danger)">حاول مرة أخرى</h2>
            <p style="font-size:2rem;">أنت تستطيع فعلها!</p>
        `;
    }

    document.getElementById('game-ui').innerHTML = `
        <div class="game-card" style="text-align:center;">
            ${resultHTML}
            <div style="font-size:2.5rem; font-weight:bold; margin: 30px 0;">
                النتيجة: ${score} من 10
            </div>
            <button class="start-btn" onclick="location.reload()" style="font-size:2rem;">العب مرة أخرى 🔄</button>
            <div style="margin-top:40px; font-size:1.2rem; opacity:0.8;">إعداد المعلّمة: شروق الحنيطي</div>
        </div>`;
}
</script>
</body>
</html>
